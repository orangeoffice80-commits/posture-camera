<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PostureScan 촬영</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#000; color:#fff;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         height:100vh; overflow:hidden; }
  #video { position:fixed; inset:0; width:100%; height:100%;
           object-fit:cover;
           -webkit-transform:translateZ(0); transform:translateZ(0); }
  #overlay { position:fixed; inset:0; pointer-events:none; }
  .guide-frame { position:absolute; left:50%; top:50%;
                 transform:translate(-50%,-52%);
                 width:42vw; height:72vh;
                 border:2px dashed rgba(255,255,255,0.6);
                 border-radius:50% 50% 42% 42%; }
  .guide-text { position:absolute; bottom:145px; left:0; right:0;
                text-align:center; font-size:13px;
                color:rgba(255,255,255,0.9);
                text-shadow:0 1px 4px rgba(0,0,0,0.9); }
  #topbar { position:fixed; top:0; left:0; right:0;
            background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
            padding:14px 20px; display:flex;
            align-items:center; justify-content:space-between; }
  #topbar-title { font-size:15px; font-weight:600; }
  #btn-cancel { background:none; border:none; color:rgba(255,255,255,0.75);
                font-size:14px; cursor:pointer; padding:4px 10px; }
  #controls { position:fixed; bottom:0; left:0; right:0;
              background:rgba(0,0,0,0.78); backdrop-filter:blur(8px);
              padding:16px 20px 36px; }
  .step-bar { display:flex; justify-content:center; gap:10px; margin-bottom:14px; }
  .step-dot { width:10px; height:10px; border-radius:50%;
              background:rgba(255,255,255,0.28); transition:all .3s; }
  .step-dot.active { background:#fff; transform:scale(1.3); }
  .step-dot.done   { background:#0e9f6e; }
  #step-label { text-align:center; font-size:14px; font-weight:600;
                color:#fff; margin-bottom:14px; }
  .btn-row { display:flex; gap:10px; align-items:center; }
  #btn-capture { flex:1; padding:17px; background:#1a56db; color:#fff;
                 border:none; border-radius:50px; font-size:18px;
                 font-weight:700; cursor:pointer; transition:all .15s; }
  #btn-capture:active { transform:scale(0.96); background:#1245b0; }
  #btn-capture:disabled { background:#374151; cursor:not-allowed; }
  #btn-switch { width:54px; height:54px; background:rgba(255,255,255,0.14);
                border:1px solid rgba(255,255,255,0.28); border-radius:50%;
                color:#fff; font-size:22px; cursor:pointer; flex-shrink:0; }
  #flash { position:fixed; inset:0; background:#fff; opacity:0;
           pointer-events:none; transition:opacity .08s; z-index:99; }

  /* 오류 화면 */
  #error-screen { display:none; position:fixed; inset:0; background:#0f172a;
                  flex-direction:column; align-items:center;
                  justify-content:center; padding:32px; text-align:center;
                  z-index:100; }
  #error-screen.show { display:flex; }
  .err-icon { font-size:52px; margin-bottom:16px; }
  .err-title { font-size:18px; font-weight:700; margin-bottom:12px; }
  .err-body  { font-size:13px; color:rgba(255,255,255,0.72);
               line-height:1.75; white-space:pre-wrap; margin-bottom:24px; }
  .err-btn   { padding:14px 32px; background:#1a56db; color:#fff;
               border:none; border-radius:10px; font-size:15px;
               font-weight:600; cursor:pointer; margin-bottom:10px; width:100%; }
  .err-btn-sub { background:rgba(255,255,255,0.1); }

  /* 완료 화면 */
  #done-screen { display:none; position:fixed; inset:0; background:#065f46;
                 flex-direction:column; align-items:center;
                 justify-content:center; z-index:100; }
  #done-screen.show { display:flex; }
  .done-icon { font-size:72px; margin-bottom:16px; }
  .done-text { font-size:18px; font-weight:600; color:#fff; }
</style>
</head>
<body>

<video id="video" autoplay playsinline webkit-playsinline muted
       x5-playsinline x5-video-player-type="h5"
       x5-video-player-fullscreen="true"></video>

<div id="overlay">
  <div class="guide-frame"></div>
  <div class="guide-text" id="guide-text">신체 전체가 가이드 안에 들어오도록 서세요</div>
</div>

<div id="topbar">
  <div id="topbar-title">📷 정면 촬영</div>
  <button id="btn-cancel" onclick="cancelCapture()">✕ 취소</button>
</div>

<div id="controls">
  <div class="step-bar">
    <div class="step-dot active" id="dot-0"></div>
    <div class="step-dot" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
  </div>
  <div id="step-label">1 / 3 — 정면을 바라보고 서세요</div>
  <div class="btn-row">
    <button id="btn-capture" onclick="captureFrame()">📸 촬영</button>
    <button id="btn-switch" onclick="switchCamera()">🔄</button>
  </div>
</div>

<div id="flash"></div>

<!-- 오류 화면 -->
<div id="error-screen">
  <div class="err-icon">📷</div>
  <div class="err-title" id="err-title">카메라 권한 필요</div>
  <div class="err-body"  id="err-body"></div>
  <button class="err-btn" onclick="retryCamera()">🔄 다시 시도</button>
  <button class="err-btn err-btn-sub" onclick="cancelCapture()">취소</button>
</div>

<!-- 완료 화면 -->
<div id="done-screen">
  <div class="done-icon">✅</div>
  <div class="done-text">촬영 완료!</div>
</div>

<script>
var STEPS = [
  { key:"front", label:"📷 정면 촬영", stepLabel:"1 / 3 — 정면을 바라보고 서세요" },
  { key:"back",  label:"📷 후면 촬영", stepLabel:"2 / 3 — 뒤를 돌아서 서세요"     },
  { key:"side",  label:"📷 측면 촬영", stepLabel:"3 / 3 — 오른쪽 옆면이 보이게 서세요" }
];

var state = { step:0, stream:null, facingMode:"environment", frames:{} };

// ── 카메라 시작 ───────────────────────────────────────────────
function startCamera() {
  hideError();
  var video = document.getElementById("video");

  if (state.stream) {
    state.stream.getTracks().forEach(function(t){ t.stop(); });
    state.stream = null;
    video.srcObject = null;
  }

  // API 미지원
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showError(
      "카메라를 사용할 수 없습니다",
      "이 브라우저는 카메라를 지원하지 않습니다.\n\n" +
      "✅ Safari로 이 페이지를 열어주세요.\n" +
      "Chrome·네이버·카카오 앱 내 브라우저는\n" +
      "iOS에서 카메라 접근이 불가합니다."
    );
    return;
  }

  // 단계별 제약 시도
  var list = [
    { video:{ facingMode:{ exact:state.facingMode }, width:{ideal:1080}, height:{ideal:1920} }, audio:false },
    { video:{ facingMode:state.facingMode }, audio:false },
    { video:true, audio:false }
  ];

  (function tryNext(i) {
    if (i >= list.length) {
      showError(
        "카메라를 시작할 수 없습니다",
        "모든 카메라 설정을 시도했으나 실패했습니다.\n\n" +
        "아래 순서로 확인해 주세요:\n" +
        "① Safari로 이 페이지 열기\n" +
        "② 주소창 왼쪽 'AA' 또는 자물쇠 탭\n" +
        "③ '웹사이트 설정' → 카메라 → 허용\n" +
        "④ 페이지 새로고침"
      );
      return;
    }
    navigator.mediaDevices.getUserMedia(list[i])
      .then(function(stream) {
        state.stream = stream;
        video.srcObject = stream;
        var p = video.play();
        if (p && p.catch) p.catch(function(){});
        // 3초 후도 검은 화면이면 다음 제약으로
        setTimeout(function(){
          if (video.videoWidth === 0 && state.stream) {
            state.stream.getTracks().forEach(function(t){ t.stop(); });
            state.stream = null; video.srcObject = null;
            tryNext(i + 1);
          }
        }, 3000);
      })
      .catch(function(err) {
        console.warn("getUserMedia 오류:", err.name, err.message);
        if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
          showError(
            "카메라 권한이 거부되었습니다",
            "Safari에서 이 페이지를 열고\n아래 방법으로 권한을 허용해 주세요.\n\n" +
            "방법 1 — 주소창에서 직접 허용:\n" +
            "주소창 왼쪽 'AA' 탭 →\n'웹사이트 설정' → 카메라 → 허용\n\n" +
            "방법 2 — iOS 설정 앱:\n" +
            "설정 → Safari → 카메라 → 허용\n\n" +
            "방법 3 — 개별 앱 권한:\n" +
            "설정 → 개인 정보 보호 및 보안\n→ 카메라 → Safari 켜기\n\n" +
            "변경 후 '다시 시도' 버튼을 눌러주세요."
          );
        } else if (err.name === "NotReadableError" || err.name === "TrackStartError") {
          showError(
            "카메라 사용 중",
            "다른 앱이 카메라를 사용 중입니다.\n\n" +
            "카메라 앱이나 영상통화 앱을\n완전히 종료한 후 다시 시도해 주세요."
          );
        } else if (err.name === "NotFoundError") {
          showError("카메라 없음", "기기에서 카메라를 찾을 수 없습니다.");
        } else {
          tryNext(i + 1);
        }
      });
  })(0);
}

function retryCamera() { startCamera(); }
function hideError() { document.getElementById("error-screen").classList.remove("show"); }
function showError(title, body) {
  document.getElementById("err-title").textContent = title;
  document.getElementById("err-body").textContent  = body;
  document.getElementById("error-screen").classList.add("show");
}

// ── 촬영 ─────────────────────────────────────────────────────
function captureFrame() {
  var video = document.getElementById("video");
  if (!state.stream || video.videoWidth === 0) {
    alert("카메라가 아직 준비되지 않았습니다."); return;
  }

  // 플래시 효과
  var flash = document.getElementById("flash");
  flash.style.opacity = "0.85";
  setTimeout(function(){ flash.style.opacity = "0"; }, 130);

  var canvas = document.createElement("canvas");
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  state.frames[STEPS[state.step].key] = canvas.toDataURL("image/jpeg", 0.82);

  // 단계 전진
  document.getElementById("dot-" + state.step).classList.replace("active","done");
  state.step++;

  if (state.step < STEPS.length) {
    document.getElementById("dot-" + state.step).classList.add("active");
    document.getElementById("topbar-title").textContent = STEPS[state.step].label;
    document.getElementById("step-label").textContent   = STEPS[state.step].stepLabel;
  } else {
    finishCapture();
  }
}

// ── 완료 → opener에 전달 ──────────────────────────────────────
function finishCapture() {
  if (state.stream) {
    state.stream.getTracks().forEach(function(t){ t.stop(); });
    state.stream = null;
  }
  document.getElementById("done-screen").classList.add("show");

  // postMessage로 메인 앱에 전달
  function sendFrames() {
    try {
      var target = window.opener || window.parent;
      if (target) {
        target.postMessage({ type:"POSTURE_SCAN_FRAMES", frames:state.frames }, "*");
      }
    } catch(e) { console.error("postMessage 오류:", e); }
  }

  sendFrames();
  setTimeout(function(){
    sendFrames(); // 한 번 더 (iOS 타이밍 문제 대비)
    window.close();
  }, 1500);
}

function cancelCapture() {
  if (state.stream) state.stream.getTracks().forEach(function(t){ t.stop(); });
  try {
    var target = window.opener || window.parent;
    if (target) target.postMessage({ type:"POSTURE_SCAN_CANCELLED" }, "*");
  } catch(e) {}
  window.close();
}

function switchCamera() {
  state.facingMode = state.facingMode === "environment" ? "user" : "environment";
  startCamera();
}

// 로드 시 즉시 시작
startCamera();
</script>
</body>
</html>
